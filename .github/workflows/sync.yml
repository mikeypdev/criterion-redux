name: Daily Data Sync
on:
  schedule:
    - cron: '0 0 * * *' # Every day at Midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: "Run Sync (Pass 1: Criterion Deep-Crawl)"
        run: LIMIT=100 npm run sync
        
      - name: "Run Sync (Pass 2: TMDB Gap-Filling)"
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: LIMIT=500 npm run sync
        
      - name: Commit and Push (Updated Data)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily data sync" && git push)
          
      - name: Build
        run: npm run build
        
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
